services:
  surrealdb:
    build:
      context: ./surrealdb
    user: "0"
    ports:
      - "${SURREAL_PORT:-18000}:8000"
    command: start --user root --pass root --bind 0.0.0.0:8000 rocksdb:/data/srdb.db
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "-e", "http://localhost:8000"]
      interval: 2s
      timeout: 5s
      retries: 30

  postgres:
    build:
      context: ./postgres
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: agenticdbs
      POSTGRES_PASSWORD: agenticdbs
      POSTGRES_DB: agenticdbs
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticdbs"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  surrealdb-data:
  postgres-data:
